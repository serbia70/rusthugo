{% extends "index.html" %}
{% block main %}
<header class="page-header">
    <h1>系列文章</h1>
</header>

<ul class="terms-tags series-cloud">
    {% for term in terms %}
    <li>
        <a href="{{ term.permalink }}">
            {{ term.name }}
            <sup><strong><sup>{{ term.page_count | default(value=term.pages | length) }}</sup></strong></sup>
        </a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
