{# Lazy-loaded image shortcode - Ported from lvbibir Hugo PaperMod #}
{# Usage: {{ lazy_image(src="path/to/img.jpg", alt="description") }} #}
<img
    src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3C/svg%3E"
    data-src="{{ src }}"
    alt="{{ alt | default(value='') }}"
    class="lazy-img"
    {% if width %}width="{{ width }}"{% endif %}
    {% if height %}height="{{ height }}"{% endif %}
/>
<noscript>
    <img src="{{ src }}" alt="{{ alt | default(value='') }}" {% if width %}width="{{ width }}"{% endif %} {% if height %}height="{{ height }}"{% endif %} />
</noscript>
