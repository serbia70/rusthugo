{# Friend link shortcode - Ported from lvbibir Hugo PaperMod #}
{# Usage: {{ friend(name="Blog Name", url="https://...", logo="avatar.jpg", word="description") }} #}
<a target="_blank" href="{{ url }}" title="{{ name }}" class="friendurl">
  <div class="frienddiv">
    <div class="frienddivleft">
      <img class="myfriend" src="{{ logo }}" alt="{{ name }}" loading="lazy" />
    </div>
    <div class="frienddivright">
      <div class="friendname">{{ name }}</div>
      <div class="friendinfo">{{ word }}</div>
    </div>
  </div>
</a>
